<h2>Area Studente</h2>
<p>Qui vedi soltanto i tuoi voti.</p>

<div *ngIf="error" style="color: red; background: #ffebee; padding: 10px; margin: 10px 0;">
  <strong>Errore:</strong> {{ error }}
</div>

<div *ngIf="loading">
  <p>Caricamento voti...</p>
</div>

<table *ngIf="!loading">
  <thead>
    <tr>
      <th>Materia</th>
      <th>Voto</th>
      <th>Data</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let g of grades">
      <td>{{ g.subject }}</td>
      <td>{{ g.grade }}</td>
      <td>{{ g.created_at }}</td>
    </tr>
    <tr *ngIf="grades.length === 0">
      <td colspan="3">Nessun voto disponibile</td>
    </tr>
  </tbody>
</table>
